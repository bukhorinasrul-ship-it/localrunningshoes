<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pemesanan | Local Running Shoes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #1c1c1c;
            padding-bottom: 60px;
        }

        /* Header / Navbar Simple */
        header {
            background-color: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 20px 0;
            text-align: center;
        }

        .logo {
            font-size: 22px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: #000;
            text-decoration: none;
        }

        .logo span {
            color: #e60000;
        }

        /* Main Container */
        .order-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .order-container {
                grid-template-columns: 1fr;
            }
        }

        /* Card Style */
        .card {
            background-color: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Detail Produk Pilihan */
        .product-summary {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .product-image-placeholder {
            width: 100px;
            height: 100px;
            background-color: #f0f0f0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #888;
            font-weight: bold;
            text-align: center;
            padding: 5px;
        }

        .product-details h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .product-details .brand {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .product-details .price {
            font-size: 16px;
            font-weight: 750;
            color: #e60000;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        /* Pilihan Ukuran & Warna Kustom (Radio Buttons styled as boxes) */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
        }

        .options-grid label {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
        }

        .options-grid input[type="radio"] {
            display: none;
        }

        .options-grid input[type="radio"]:checked + label {
            border-color: #e60000;
            background-color: #fff5f5;
            color: #e60000;
            font-weight: 700;
            box-shadow: 0 0 0 1px #e60000;
        }

        /* Input biasa */
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: #000;
        }

        /* Pilihan Pembayaran */
        .payment-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .payment-item {
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #e5e5e5;
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .payment-item:hover {
            background-color: #fdfdfd;
        }

        .payment-item input {
            accent-color: #e60000;
            width: 18px;
            height: 18px;
        }

        .payment-text h4 {
            font-size: 14px;
            font-weight: 600;
        }

        /* Ringkasan Belanja (Sidebar Kanan) */
        .summary-card {
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 12px;
            color: #555;
        }

        .summary-row.total {
            border-top: 1px solid #eee;
            padding-top: 15px;
            font-size: 18px;
            font-weight: 750;
            color: #000;
            margin-top: 15px;
        }

        .btn-pay {
            width: 100%;
            background-color: #e60000;
            color: #fff;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 20px;
        }

        .btn-pay:hover {
            background-color: #b30000;
        }

        .btn-pay:active {
            transform: scale(0.98);
        }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #666;
            text-decoration: none;
        }

        .btn-back:hover {
            color: #000;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Local<span>Running</span></a>
    </header>

    <main class="order-container">
        <section>
            <div class="card">
                <h2>Produk yang Dipesan</h2>
                <div class="product-summary">
                    <div class="product-image-placeholder" id="display-image">
                        Sepatu Lari
                    </div>
                    <div class="product-details">
                        <div class="brand" id="display-brand">Brand</div>
                        <h3 id="display-name">Nama Sepatu Lari</h3>
                        <div class="price" id="display-price">Rp 0</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Pilih Varian</h2>
                
                <div class="form-group">
                    <label>Ukuran Sepatu (EU)</label>
                    <div class="options-grid">
                        <div>
                            <input type="radio" id="size39" name="size" value="39" checked>
                            <label for="size39">39</label>
                        </div>
                        <div>
                            <input type="radio" id="size40" name="size" value="40">
                            <label for="size40">40</label>
                        </div>
                        <div>
                            <input type="radio" id="size41" name="size" value="41">
                            <label for="size41">41</label>
                        </div>
                        <div>
                            <input type="radio" id="size42" name="size" value="42">
                            <label for="size42">42</label>
                        </div>
                        <div>
                            <input type="radio" id="size43" name="size" value="43">
                            <label for="size43">43</label>
                        </div>
                        <div>
                            <input type="radio" id="size44" name="size" value="44">
                            <label for="size44">44</label>
                        </div>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 25px;">
                    <label>Pilihan Warna</label>
                    <div class="options-grid" style="grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));">
                        <div>
                            <input type="radio" id="color1" name="color" value="Original Color" checked>
                            <label for="color1">Sesuai Foto</label>
                        </div>
                        <div>
                            <input type="radio" id="color2" name="color" value="Stealth Black">
                            <label for="color2">Hitam</label>
                        </div>
                        <div>
                            <input type="radio" id="color3" name="color" value="White Edition">
                            <label for="color3">Putih</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Data Pengiriman</h2>
                <div class="form-group">
                    <label for="name">Nama Lengkap</label>
                    <input type="text" id="name" class="form-control" placeholder="Masukkan nama penerima" required>
                </div>
                <div class="form-group">
                    <label for="phone">Nomor WhatsApp / Telepon</label>
                    <input type="tel" id="phone" class="form-control" placeholder="Contoh: 081234567xxx" required>
                </div>
                <div class="form-group">
                    <label for="address">Alamat Lengkap</label>
                    <textarea id="address" class="form-control" rows="3" placeholder="Nama jalan, RT/RW, Kecamatan, Kota/Kabupaten, Provinsi" required></textarea>
                </div>
            </div>

            <div class="card">
                <h2>Metode Pembayaran</h2>
                <div class="payment-options">
                    <label class="payment-item">
                        <input type="radio" name="payment" value="Transfer Bank (VA)" checked>
                        <div class="payment-text">
                            <h4>Virtual Account (BCA, Mandiri, BNI, BRI)</h4>
                        </div>
                    </label>
                    <label class="payment-item">
                        <input type="radio" name="payment" value="E-Wallet (QRIS)">
                        <div class="payment-text">
                            <h4>QRIS (Gopay, OVO, Dana, LinkAja)</h4>
                        </div>
                    </label>
                    <label class="payment-item">
                        <input type="radio" name="payment" value="COD">
                        <div class="payment-text">
                            <h4>Bayar di Tempat (COD)</h4>
                        </div>
                    </label>
                </div>
            </div>
        </section>

        <section>
            <div class="card summary-card">
                <h2>Ringkasan Belanja</h2>
                <div class="summary-row">
                    <span>Harga Produk</span>
                    <span id="summary-product-price">Rp 0</span>
                </div>
                <div class="summary-row">
                    <span>Biaya Pengiriman</span>
                    <span style="color: #2ec4b6; font-weight: 600;">GRATIS</span>
                </div>
                <div class="summary-row">
                    <span>Biaya Proteksi</span>
                    <span>Rp 0</span>
                </div>
                <div class="summary-row total">
                    <span>Total Bayar</span>
                    <span id="summary-total-price">Rp 0</span>
                </div>

                <button class="btn-pay" id="btn-submit-order">Bayar Sekarang</button>
                <a href="index.html" class="btn-back">← Kembali ke Katalog</a>
            </div>
        </section>
    </main>

    <script>
        // Ambil parameter data produk dari URL halaman sebelumnya
        const urlParams = new URLSearchParams(window.location.search);
        const productName = urlParams.get('name') || "Sepatu Lari Spesial";
        const productBrand = urlParams.get('brand') || "Local Brand";
        const productPriceStr = urlParams.get('price') || "Rp 500,000";

        // Pasang data produk ke elemen UI HTML
        document.getElementById('display-name').textContent = productName;
        document.getElementById('display-brand').textContent = productBrand;
        document.getElementById('display-price').textContent = productPriceStr;
        document.getElementById('display-image').textContent = productBrand; // Inisial sederhana pengganti gambar

        // Pasang data harga ke tabel Ringkasan Belanja
        document.getElementById('summary-product-price').textContent = productPriceStr;
        document.getElementById('summary-total-price').textContent = productPriceStr;

        // Logika saat tombol "Bayar Sekarang" diklik
        document.getElementById('btn-submit-order').addEventListener('click', function() {
            // Validasi Input Data Pengiriman dasar
            const nameInput = document.getElementById('name').value.trim();
            const phoneInput = document.getElementById('phone').value.trim();
            const addressInput = document.getElementById('address').value.trim();
            
            if(!nameInput || !phoneInput || !addressInput) {
                alert('Mohon lengkapi Data Pengiriman Anda terlebih dahulu!');
                return;
            }

            // Ambil data varian terpilih & metode pembayaran
            const selectedSize = document.querySelector('input[name="size"]:checked').value;
            const selectedColor = document.querySelector('input[name="color"]:checked').value;
            const selectedPayment = document.querySelector('input[name="payment"]:checked').value;

            // Mengalihkan halaman ke bayar.html dengan melekatkan parameter nama produk, harga, dan metode pembayaran
            window.location.href = `bayar.html?name=${encodeURIComponent(productName)}&price=${encodeURIComponent(productPriceStr)}&method=${encodeURIComponent(selectedPayment)}`;
        });
    </script>
</body>
</html>
