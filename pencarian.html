<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencarian Mengambang Modern</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background: #f1f5f9;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* === CONTAINER UTAMA UTK PENCARIAN MENGAMBANG === */
        .floating-search-container {
            position: fixed;
            bottom: 30px; /* Jarak dari bawah layar */
            right: 30px;  /* Jarak dari kanan layar */
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        /* Wrapper Form Pencarian */
        .search-box {
            position: relative;
            height: 50px;
            max-width: 50px; /* Lebar awal berbentuk lingkaran */
            width: 100%;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* Ketika class 'active' dipicu lewat JS, kotak akan melebar */
        .search-box.active {
            max-width: 320px;
        }

        /* Input Field */
        .search-box input {
            height: 100%;
            width: 100%;
            border: none;
            outline: none;
            background: #ffffff;
            font-size: 15px;
            border-radius: 50px;
            padding: 0 60px 0 20px; /* padding kanan disisakan untuk icon */
            color: #1e293b;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .search-box.active input {
            opacity: 1;
            pointer-events: auto;
        }

        /* Tombol / Ikon Cari */
        .search-button {
            position: absolute;
            top: 0;
            right: 0;
            width: 50px;
            height: 50px;
            background: #0f172a; /* Warna gelap maskulin */
            color: #ffffff;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2);
            border: none;
        }

        .search-box.active .search-button {
            background: #e60000; /* Berubah merah saat aktif */
            box-shadow: 0 8px 20px rgba(230, 0, 0, 0.2);
        }

        /* Tombol Submit Asli (Disembunyikan di dalam icon) */
        .search-button input[type="submit"] {
            display: none;
        }
    </style>
</head>
<body>

    <div style="text-align: center; color: #64748b;">
        <h2>Lihat ke Pojok Kanan Bawah</h2>
        <p>Klik ikon pencarian untuk membukanya.</p>
    </div>

    <div class="floating-search-container">
        <form action="#" method="GET" class="search-box" id="searchBox">
            <input type="text" name="query" placeholder="Cari produk atau artikel..." id="searchInput">
            
            <button type="button" class="search-button" id="searchBtn">
                <span id="searchIcon">🔍</span>
                <input type="submit" id="submitBtn">
            </button>
        </form>
    </div>

    <script>
        const searchBox = document.getElementById('searchBox');
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');
        const searchIcon = document.getElementById('searchIcon');
        const submitBtn = document.getElementById('submitBtn');

        searchBtn.addEventListener('click', () => {
            // Jika pencarian belum terbuka
            if (!searchBox.classList.contains('active')) {
                searchBox.classList.add('active');
                searchInput.focus();
                searchIcon.innerText = "➔"; // Ubah ikon jadi panah submit
            } else {
                // Jika sudah terbuka dan ada teksnya, lakukan submit form
                if (searchInput.value.trim() !== "") {
                    submitBtn.click(); 
                } else {
                    // Jika teks kosong, tutup kembali pencarian
                    searchBox.classList.remove('active');
                    searchIcon.innerText = "🔍"; // Kembalikan ke ikon kaca pembesar
                }
            }
        });

        // Menutup pencarian otomatis jika pengguna mengklik di luar area pencarian
        document.addEventListener('click', (e) => {
            if (!searchBox.contains(e.target) && searchBox.classList.contains('active')) {
                searchBox.classList.remove('active');
                searchIcon.innerText = "🔍";
                searchInput.value = ""; // Reset teks
            }
        });
    </script>
</body>
</html>
